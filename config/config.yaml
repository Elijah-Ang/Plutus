mode: paper
live_enabled: false
explicit_live_confirmation: false
capabilities:
  live_trading_supported: false
  auto_execution_supported: false
broker: alpaca
scan_interval_minutes: 10
require_power: true
require_market_open: true
preflight:
  research_only:
    require_ac_power: false
    require_internet: true
    require_broker: false
    allow_market_closed: true
  trading:
    require_ac_power: true
    require_internet: true
    require_broker: true
    require_market_open: true
watchlist: [SPY, QQQ, DIA, IWM]
approved_strategy_versions: [rule_based_v1]

# Market Profiles
market_profiles:
  us_equities:
    name: "US Equities Night Market"
    status: active
    timezone: "America/New_York"
    session_hours: "09:30-16:00"
    execution_enabled: true
    proposals_enabled: true
    broker: alpaca
    watchlist: [SPY, QQQ, DIA, IWM]
    observation_watchlist: [XLK, XLF, XLV, XLE, XLY]
  sgx_observation:
    name: "SGX Singapore Market"
    status: observation_only
    timezone: "Asia/Singapore"
    session_hours: "09:00-17:00"
    execution_enabled: false
    proposals_enabled: false
    broker: none
    watchlist: [ES3.SI]
  hkex_observation:
    name: "HKEX Hong Kong Market"
    status: observation_only
    timezone: "Asia/Hong_Kong"
    session_hours: "09:30-16:00"
    execution_enabled: false
    proposals_enabled: false
    broker: none
    watchlist: [2800.HK]

# Dynamic Proposal Expiry Config
proposal_expiry_default_minutes: 15
proposal_expiry_min_minutes: 5
proposal_expiry_max_minutes: 20
proposal_expiry_high_volatility_minutes: 5
proposal_expiry_low_volatility_minutes: 20
proposal_expiry_notify_on_expiry: true
proposal_expiry_high_volatility_threshold: 0.20
proposal_expiry_low_volatility_threshold: 0.12

# Auto-Execution Design (strictly paper-only, disabled by default)
auto_execution_enabled: false
auto_execution_mode: manual_only
paper_auto_min_asset_score: 90
paper_auto_min_trade_score: 90
paper_auto_max_notional: 1
paper_auto_max_trades_per_day: 1
paper_auto_require_no_open_orders: true
paper_auto_require_final_revalidation: true
paper_auto_notify_after_execution: true

portfolio_execution_mode: risk_budgeted
proposal_mode:
  type: ranked_batch
  send_all_actionable_candidates: true
  combine_candidates_into_one_message: true
  require_individual_approval_per_trade: true
  allow_yes_all_for_paper: true
  yes_all_requires_each_trade_final_revalidation: true

execution_limits:
  max_new_buy_orders_per_day: null
  max_new_buy_proposals_per_cycle: null
  max_pending_buy_proposals: null

risk_budget:
  risk_per_trade_pct: 0.05
  max_open_risk_pct: 0.30
  max_daily_realized_loss_pct: 0.25
  max_total_portfolio_exposure_pct: 6.0
  max_single_symbol_exposure_pct: 2.5
  max_cluster_exposure_pct: 5.0
  max_adds_only_if_profitable: true
  block_averaging_down: true

data_providers:
  dynamic_universe_provider: eodhd

eodhd:
  enabled: true
  api_key_secret_name: TradingAgent.EODHD_API_KEY
  base_url: https://eodhd.com/api
  timeout_seconds: 10
  max_retries: 2
  retry_backoff_seconds: 2
  plan_limited_cooldown_minutes: 1440
  cache_ttl_minutes:
    symbols: 1440
    daily_bars: 720
    intraday_bars: 15
    news: 60
    fundamentals: 1440
    technicals: 60
    screener: 60
  rate_limit:
    max_calls_per_run: 80
    max_calls_per_day: 1000
    fail_closed_when_exceeded: false

news_providers:
  marketaux:
    enabled: false
    api_key_secret_name: TradingAgent.MARKETAUX_API_KEY
    usage: shortlisted_dynamic_universe_news_fallback_only

dynamic_universe:
  enabled: true
  provider: eodhd
  paper_only: true
  llm_explanations:
    enabled: false
    max_candidates_per_run: 5
    explanation_only: true
    deterministic_scores_authoritative: true
    cache_enabled: true
  asset_classes_enabled:
    equities: true
    etfs: true
    funds: true
    indices: true
    forex: false
    crypto: false
    options: false
    bonds: false
  execution_allowed_asset_classes:
    equities: true
    etfs: true
    funds: false
    indices: false
    forex: false
    crypto: false
    options: false
    bonds: false
  raw_sources:
    eodhd_exchange_symbols: true
    eodhd_screener: true
    eodhd_news: true
    eodhd_intraday_bars: true
    eodhd_eod_bars: true
    existing_static_watchlist: true
  max_raw_symbols_per_research_run: 500
  max_research_symbols_per_run: 100
  max_observation_symbols: 30
  max_dynamic_paper_tradable_symbols: 12
  min_price: 5.0
  min_avg_daily_volume: 1000000
  min_dollar_volume: 10000000
  max_spread_pct: 0.50
  exclusions:
    otc: true
    penny_stocks: true
    leveraged_etfs: true
    inverse_etfs: true
    halted_symbols: true
    stale_data: true
    illiquid_symbols: true
    extreme_volatility: true
  promotion:
    min_research_score: 55
    min_observation_score: 65
    min_paper_tradable_score: 75
    min_observation_cycles: 3
    min_observation_sessions: 1
    min_liquidity_score: 70
    min_trend_score: 70
    min_relative_strength_score: 65
    min_news_score: 50
    require_shadow_tracking: true
    allow_fast_track_paper_tradable: false
    allow_medium_confidence_paper_tradable: true
    max_new_paper_tradable_per_day: 3
  exploration:
    enabled: true
    max_new_research_candidates_per_cycle: 20
    max_new_observation_promotions_per_day: 5
    max_new_dynamic_paper_tradable_per_day: 1
    min_research_score_for_exploration: 55
    require_clean_symbol_metadata: true
    require_liquidity_pass: true
    require_price_data: true
    allow_news_missing: true
    allow_fundamentals_missing: true
  observation_maturity_review:
    enabled: true
    min_observation_cycles: 3
    min_market_open_refreshes: 2
    review_interval_minutes: 30
    require_fresh_eod: true
    require_fresh_intraday_for_promotion: false
    allow_cached_intraday_for_promotion: true
    intraday_freshness_window_minutes: 30
    allow_alpaca_quote_fallback_for_promotion: true
    reduce_confidence_if_intraday_missing: true
    allow_eod_only_promotion_when_market_closed: true
    require_cluster_clearance: true
    allow_keep_observation_with_reason: true
    xl_sector_symbols: [XLK, XLE, XLF, XLV, XLY]
  proposal_generation:
    require_fresh_market_data: true
    require_final_validation: true
  demotion:
    max_weak_cycles: 5
    max_no_entry_days: 5
    catalyst_stale_after_days: 3
    demote_if_liquidity_fails: true
    demote_if_volatility_extreme: true
    demote_if_shadow_performance_bad: true
    demote_if_cluster_overcrowded: true
  schedules:
    daily_deep_research_enabled: true
    daily_deep_research_time_sgt: "20:30"
    intraday_light_refresh_enabled: true
    intraday_light_refresh_minutes: 30
    event_triggered_refresh_enabled: true
    post_market_review_enabled: true
    weekly_cleanup_enabled: true

dynamic_universe_resilience:
  enabled: true
  internet_required_for_provider_calls: true
  fail_closed_on_no_internet: true
  keep_existing_universe_on_no_internet: true
  block_new_promotions_when_offline: true
  block_demotions_when_provider_unavailable: true
  power_policy:
    allow_light_refresh_on_battery: true
    allow_deep_research_on_battery: false
    min_battery_pct_for_light_refresh: 35
    min_battery_pct_for_deep_research: 60
    skip_all_research_below_battery_pct: 25
  stale_data_policy:
    max_age_minutes_for_intraday_research: 45
    max_age_minutes_for_promotion: 90
    max_age_minutes_for_trade_eligibility: 30
    block_promotion_if_research_stale: true
    block_new_paper_tradable_if_provider_down: true
    block_trade_from_stale_dynamic_research: true
  catchup_policy:
    enabled: true
    run_one_catchup_per_schedule_type: true
    do_not_replay_all_missed_intraday_cycles: true
    daily_deep_catchup_allowed: true
    intraday_light_catchup_allowed: true
    post_market_catchup_allowed: true
    weekly_cleanup_catchup_allowed: true
    max_catchup_runs_per_scanner_cycle: 2
    min_minutes_between_catchups: 15
    block_new_promotions_during_late_day_catchup: true
  offline_digest:
    include_provider_health_in_digest: true
    include_missed_research_count: true
    alert_only_on_state_change: true

position_management:
  enabled: true
  profit_taking:
    enabled: true
    prefer_r_multiple: true
    level_1_r: 1.5
    level_1_sell_fraction: 0.25
    level_2_r: 2.0
    level_2_sell_fraction: 0.33
    level_3_r: 3.0
    level_3_sell_fraction: 0.50
    fallback_level_1_profit_pct: 2.0
    fallback_level_1_sell_fraction: 0.25
    fallback_level_2_profit_pct: 3.0
    fallback_level_2_sell_fraction: 0.33
    fallback_level_3_profit_pct: 5.0
    fallback_level_3_sell_fraction: 0.50
    minimum_notional_to_sell: 1.00
    never_sell_more_than_position: true
    require_telegram_approval: true
  profit_protection:
    enabled: true
    activate_at_r: 1.0
    fallback_activate_at_profit_pct: 2.0
    giveback_warning_ratio: 0.40
    giveback_exit_ratio: 0.55
    min_peak_profit_pct: 2.0
    protect_sell_fraction: 0.25
    exit_sell_fraction: 0.50
    require_telegram_approval: true
  trailing_stop:
    enabled: true
    activate_at_r: 1.0
    fallback_activate_at_profit_pct: 2.0
    atr_multiplier: 2.0
    fallback_trailing_pct: 1.5
    require_close_below_stop: true
    sell_fraction: 0.50
    require_telegram_approval: true
  healthy_pullback_add:
    enabled: true
    minimum_unrealized_profit_pct: 0.5
    minimum_trade_score: 85
    minimum_score_improvement: 5
    max_emergency_exit_score: 40
    max_profit_giveback_ratio: 0.35
    max_pullback_atr_multiple: 1.5
    fallback_max_pullback_pct: 1.0
    require_price_above_avg_entry: true
    require_price_above_ma50: true
    require_price_above_ma200_if_available: true
    require_no_profit_protection_warning: true
    require_no_exit_signal: true
    require_normal_or_elevated_volatility_only: true
    suggested_add_notional: 50.0
    require_telegram_approval: true

telegram:
  approval_enabled: true
  proposal_expiry_minutes: 15
  allow_plain_yes_only_when_single_pending_proposal: true
  telegram_approval_listener_enabled: true
  telegram_approval_poll_interval_seconds: 30
  telegram_approval_listener_mode: approval_only
  market_scan_processes_telegram_updates: false
  dynamic_universe_premarket_updates_enabled: true
  market_closed_status:
    suppress_no_change: true
    max_frequency_minutes: 180
    compare_symbol_sets: true
    ignore_minor_count_noise: true
    always_send_on_material_symbol_change: true
    always_send_errors: true
    always_send_catchup_completion: true
  approval_price_refresh_required: true
  approval_max_price_age_seconds: 60
  approval_max_price_move_bps: 25

ai:
  enabled: true
  provider: openai
  model: gpt-5.4-mini
  reasoning_effort_default: low
  reasoning_effort_risk_review: medium
  max_summary_words: 180
  mask_account_values: true
  allow_deterministic_only_live: false
  ai_review_on_every_run: false
  ai_review_min_score: 65
  ai_review_min_interval_minutes: 30
  ai_daily_call_limit: 10
  ai_max_calls_per_run: 2
ml_shadow_enabled: false
risk:
  max_trade_notional_paper: 50
  max_trade_notional_live: 5
  max_trades_per_day: 3
  max_open_positions: 3
  allow_add_to_existing_position: true
  block_new_buys_when_any_position_open: false
  block_new_buys_after_buy_order_submitted_today: false
  block_same_symbol_rebuy_while_position_open: false
  allow_margin: false
  allow_shorting: false
  allow_options: false
  allow_crypto: false
  allow_fractional: true
  signal_expiry_minutes: 10
  stop_if_daily_loss_exceeds: 5
  stop_if_weekly_loss_exceeds: 10
  require_final_revalidation: true
  allowed_order_types: [market, limit]
  max_price_age_seconds: 120
  min_historical_bars: 50
  max_price_gap_pct: 15
  max_new_buy_proposals_per_cycle: 1
  max_pending_buy_proposals: 1
  allow_multiple_exit_proposals: true
  require_gpt_review_for_buy_proposals: true

portfolio_behavior:
  max_open_positions: 3
  max_new_buy_orders_per_day: 3
  max_new_buy_proposals_per_cycle: 1
  max_pending_buy_proposals: 1
  allow_add_to_existing_position: true
  block_averaging_down: true
  max_adds_per_symbol_per_day: 1
  max_total_adds_per_symbol: 2
  max_total_portfolio_exposure_pct: 6.0
  max_single_symbol_exposure_pct: 2.5
  max_correlated_us_equity_exposure_pct: 5.0
  block_new_buy_if_exit_pending: true
  block_new_buy_if_emergency_exit_score_above: 40

position_sizing:
  enabled: true
  base_paper_notional: 50
  min_paper_notional: 5
  max_initial_paper_notional: 250
  max_add_paper_notional: 100
  risk_per_trade_pct: 0.05
  max_position_notional_pct: 2.0
  stop_model:
    method: max_of_atr_or_technical
    atr_multiple: 2.0
    technical_stop: below_ma50_or_recent_swing_low
    max_stop_pct: 8.0
    min_stop_pct: 1.0
  score_multiplier:
    "65_74": 0.5
    "75_84": 1.0
    "85_94": 1.5
    "95_100": 2.0
  volatility_multiplier:
    too_quiet: 0.75
    normal: 1.0
    elevated: 0.5
    high: 0.0
    extreme: 0.0

portfolio_optimizer:
  clusters:
    us_broad_market: [SPY, DIA, IWM]
    us_growth_tech: [QQQ, XLK]
    defensive_healthcare: [XLV]
    financials: [XLF]
    energy: [XLE]
  max_same_cluster_positions: 2
  max_same_cluster_exposure_pct: 5.0
  max_total_portfolio_exposure_pct: 6.0
  max_single_symbol_exposure_pct: 2.5

add_to_position:
  enabled: true
  only_if_profitable: true
  min_unrealized_gain_pct: 0.5
  min_trade_score: 85
  min_score_improvement: 5
  require_new_breakout_or_pullback_reclaim: true
  max_add_size_fraction_of_initial: 0.5
  max_adds_per_symbol_per_day: 1
  max_total_adds_per_symbol: 2
  block_averaging_down: true
  block_if_exit_warning: true
  block_if_emergency_exit_score_above: 40
cash_management:
  enabled: true
  mode: recommend_only
  profit_lock_rate: 0.30
  cash_reserve_rate: 0.20
  reinvest_rate: 0.50
  minimum_withdrawal: 10
  require_realized_settled_profit: true
  allow_api_withdrawal: false
storage:
  sqlite_path: data/trading_agent.db
  export_dir: data/exports
  backup_dir: data/backups
  active_db_must_be_local: true

# 30-Minute Telegram Market Digest Config
digest:
  telegram_digest_enabled: true
  telegram_digest_interval_minutes: 30
  telegram_digest_market_hours_only: true
  telegram_digest_include_observation_symbols: true
  telegram_digest_max_symbols: 6
  telegram_digest_use_gpt: false
  telegram_digest_min_cycles_required: 2
  telegram_digest_send_when_market_closed: false
  market_closed_status:
    suppress_no_change: true
    max_frequency_minutes: 180
    always_send_on_change: true
    always_send_errors: true
    always_send_catchup_completion: true

# Paper-only Emergency Auto-Exit Config
emergency_exit:
  enabled: true
  max_wait_seconds_sleep: 15
  max_wait_seconds_normal: 60
