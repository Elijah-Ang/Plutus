name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.9'
      - name: Install locked dependencies
        run: python -m pip install --requirement requirements.lock && python -m pip install --no-deps -e .
      - name: Run offline suite
        env:
          TRADING_AGENT_TESTING: '1'
        run: python -m pytest
