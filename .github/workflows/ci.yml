name: CI

on:
  push:
    branches: [main, codex/plutus-audit-hardening]
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.9'
      - name: Install locked dependencies
        run: python -m pip install --requirement requirements.lock && python -m pip install --no-deps -e .
      - name: Compile application, tests, and scripts
        run: python -m compileall app tests scripts
      - name: Validate configuration
        run: |
          python - <<'PY'
          from app.configuration import validate_config
          from app.utils import load_config
          errors = validate_config(load_config())
          if errors:
              raise SystemExit("configuration validation failed: " + "; ".join(errors))
          PY
      - name: Validate migrations, schemas, and versions
        env:
          TRADING_AGENT_TESTING: '1'
        run: python -m pytest -q tests/test_phase0_migration_proof.py tests/test_release_eligibility.py tests/test_plutus_audit_hardening.py
      - name: Verify no-live-trading safeguards
        env:
          TRADING_AGENT_TESTING: '1'
        run: python -m pytest -q tests/test_phase0_runtime_isolation.py tests/test_safety_repairs.py tests/test_execution.py
      - name: Verify paper-only capabilities
        env:
          TRADING_AGENT_TESTING: '1'
        run: python -m pytest -q tests/test_phase0_execution_integrity.py tests/test_final_safety_accounting.py tests/test_strategy_execution_registry.py
      - name: Verify deterministic replay
        env:
          TRADING_AGENT_TESTING: '1'
        run: python -m pytest -q tests/test_adaptive_conviction.py tests/test_phase4_adaptive_allocator.py tests/test_phase43_multi_strategy_allocator.py tests/test_strategy_performance.py tests/test_plutus_audit_hardening.py
      - name: Verify critical approval, execution, reconciliation, and recovery paths
        env:
          TRADING_AGENT_TESTING: '1'
        run: python -m pytest -q tests/test_dynamic_approval_and_validation.py tests/test_phase0_approval_recovery.py tests/test_phase0_crash_boundaries.py tests/test_phase0_state_and_fills.py tests/test_rotation_coordinator.py tests/test_risk_budgeted_ranked_batches.py
      - name: Run full pytest release gate
        env:
          TRADING_AGENT_TESTING: '1'
        run: python -m pytest -q
